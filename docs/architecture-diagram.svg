<svg width="900" height="660" viewBox="0 0 900 660" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">

  <!-- Definitions: arrowhead markers, gradients, drop shadows -->
  <defs>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
    <!-- Subtle glow for connectors -->
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#60A5FA"/>
    </marker>
    <marker id="arrow-deploy" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#A78BFA"/>
    </marker>

    <!-- Layer background gradients -->
    <linearGradient id="grad-client" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#1A3050"/>
    </linearGradient>
    <linearGradient id="grad-api" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1C3D6B"/>
      <stop offset="100%" stop-color="#172F52"/>
    </linearGradient>
    <linearGradient id="grad-data" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#162A4A"/>
      <stop offset="100%" stop-color="#121F38"/>
    </linearGradient>
    <linearGradient id="grad-infra" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A3E"/>
      <stop offset="100%" stop-color="#14143A"/>
    </linearGradient>

    <!-- Box gradients -->
    <linearGradient id="box-client" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="box-api" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0369A1"/>
      <stop offset="100%" stop-color="#075985"/>
    </linearGradient>
    <linearGradient id="box-pg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#065F46"/>
      <stop offset="100%" stop-color="#064E3B"/>
    </linearGradient>
    <linearGradient id="box-redis" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#991B1B"/>
      <stop offset="100%" stop-color="#7F1D1D"/>
    </linearGradient>
    <linearGradient id="box-es" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#92400E"/>
      <stop offset="100%" stop-color="#78350F"/>
    </linearGradient>
    <linearGradient id="box-cassandra" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4C1D95"/>
      <stop offset="100%" stop-color="#3B0764"/>
    </linearGradient>
    <linearGradient id="box-openai" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#134E4A"/>
      <stop offset="100%" stop-color="#0F3B38"/>
    </linearGradient>
    <linearGradient id="box-infra" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
  </defs>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- BACKGROUND -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect width="900" height="660" fill="#0B1629" rx="12"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- TITLE -->
  <!-- ═══════════════════════════════════════════════════ -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#F0F9FF" letter-spacing="0.5">AI SaaS Platform — Architecture</text>
  <line x1="180" y1="38" x2="720" y2="38" stroke="#3B82F6" stroke-width="1.5" opacity="0.5"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LAYER 1 — CLIENT  (y=50, h=90) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Layer band -->
  <rect x="20" y="48" width="860" height="90" rx="10" fill="url(#grad-client)" stroke="#3B82F6" stroke-width="1" opacity="0.85"/>
  <text x="34" y="64" font-size="10" font-weight="600" fill="#93C5FD" letter-spacing="1" text-transform="uppercase">LAYER 1 — CLIENT</text>

  <!-- Next.js box -->
  <rect x="300" y="68" width="300" height="58" rx="8" fill="url(#box-client)" filter="url(#shadow)"/>
  <rect x="300" y="68" width="300" height="58" rx="8" fill="none" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="450" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Next.js 16 Frontend</text>
  <text x="450" y="105" text-anchor="middle" font-size="10" fill="#BAE6FD">Dashboard · Documents · Ask AI · Usage</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- ARROW: Client → API (label: HTTPS + WSS) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <line x1="450" y1="126" x2="450" y2="162" stroke="#60A5FA" stroke-width="1.8" marker-end="url(#arrow)" stroke-dasharray="5,3"/>
  <rect x="390" y="138" width="120" height="16" rx="4" fill="#0B1629" opacity="0.85"/>
  <text x="450" y="150" text-anchor="middle" font-size="9.5" fill="#93C5FD" font-weight="600">HTTPS + WSS</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LAYER 2 — API  (y=168, h=120) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="20" y="165" width="860" height="120" rx="10" fill="url(#grad-api)" stroke="#0EA5E9" stroke-width="1" opacity="0.85"/>
  <text x="34" y="181" font-size="10" font-weight="600" fill="#7DD3FC" letter-spacing="1">LAYER 2 — API LAYER</text>

  <!-- Express box (wide) -->
  <rect x="100" y="186" width="700" height="85" rx="8" fill="url(#box-api)" filter="url(#shadow)"/>
  <rect x="100" y="186" width="700" height="85" rx="8" fill="none" stroke="#38BDF8" stroke-width="1.5"/>
  <text x="450" y="206" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Express 5 REST API + Socket.IO</text>

  <!-- Sub-items in a row -->
  <!-- Item 1 -->
  <rect x="118" y="215" width="155" height="46" rx="6" fill="#0C2A45" stroke="#0EA5E9" stroke-width="1" opacity="0.9"/>
  <text x="196" y="234" text-anchor="middle" font-size="10" font-weight="600" fill="#7DD3FC">🔐 JWT Auth</text>
  <text x="196" y="250" text-anchor="middle" font-size="9" fill="#BAE6FD">Middleware</text>

  <!-- Item 2 -->
  <rect x="284" y="215" width="155" height="46" rx="6" fill="#0C2A45" stroke="#0EA5E9" stroke-width="1" opacity="0.9"/>
  <text x="362" y="234" text-anchor="middle" font-size="10" font-weight="600" fill="#7DD3FC">⏱ Rate Limiting</text>
  <text x="362" y="250" text-anchor="middle" font-size="9" fill="#BAE6FD">express-rate-limit</text>

  <!-- Item 3 -->
  <rect x="450" y="215" width="155" height="46" rx="6" fill="#0C2A45" stroke="#0EA5E9" stroke-width="1" opacity="0.9"/>
  <text x="528" y="234" text-anchor="middle" font-size="10" font-weight="600" fill="#7DD3FC">🛡 CORS + Helmet</text>
  <text x="528" y="250" text-anchor="middle" font-size="9" fill="#BAE6FD">Security Headers</text>

  <!-- Item 4 -->
  <rect x="616" y="215" width="166" height="46" rx="6" fill="#0C2A45" stroke="#0EA5E9" stroke-width="1" opacity="0.9"/>
  <text x="699" y="234" text-anchor="middle" font-size="10" font-weight="600" fill="#7DD3FC">⚙ BullMQ Workers</text>
  <text x="699" y="250" text-anchor="middle" font-size="9" fill="#BAE6FD">Job Queues / Redis</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- ARROWS: API → Data Stores (5 arrows) -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- Horizontal trunk line from API layer base -->
  <line x1="90" y1="300" x2="810" y2="300" stroke="#1E40AF" stroke-width="1.2" opacity="0.4"/>

  <!-- Arrow to PostgreSQL  (center x=100) -->
  <line x1="109" y1="285" x2="109" y2="360" stroke="#60A5FA" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="50" y="303" width="82" height="14" rx="3" fill="#0B1629" opacity="0.9"/>
  <text x="91" y="314" text-anchor="middle" font-size="8.5" fill="#93C5FD" font-weight="600">Prisma ORM</text>

  <!-- Arrow to Redis (center x=260) -->
  <line x1="260" y1="285" x2="260" y2="360" stroke="#60A5FA" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="215" y="303" width="70" height="14" rx="3" fill="#0B1629" opacity="0.9"/>
  <text x="250" y="314" text-anchor="middle" font-size="8.5" fill="#93C5FD" font-weight="600">ioredis</text>

  <!-- Arrow to Elasticsearch (center x=420) -->
  <line x1="420" y1="285" x2="420" y2="360" stroke="#60A5FA" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="372" y="303" width="70" height="14" rx="3" fill="#0B1629" opacity="0.9"/>
  <text x="407" y="314" text-anchor="middle" font-size="8.5" fill="#93C5FD" font-weight="600">ES client</text>

  <!-- Arrow to Cassandra (center x=580) -->
  <line x1="580" y1="285" x2="580" y2="360" stroke="#60A5FA" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="520" y="303" width="108" height="14" rx="3" fill="#0B1629" opacity="0.9"/>
  <text x="574" y="314" text-anchor="middle" font-size="8.5" fill="#93C5FD" font-weight="600">cassandra-driver</text>

  <!-- Arrow to OpenAI (center x=790) -->
  <line x1="755" y1="285" x2="755" y2="360" stroke="#60A5FA" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="712" y="303" width="78" height="14" rx="3" fill="#0B1629" opacity="0.9"/>
  <text x="751" y="314" text-anchor="middle" font-size="8.5" fill="#93C5FD" font-weight="600">OpenAI SDK</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LAYER 3 — DATA STORES  (y=360, h=120) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="20" y="355" width="860" height="125" rx="10" fill="url(#grad-data)" stroke="#1D4ED8" stroke-width="1" opacity="0.85"/>
  <text x="34" y="371" font-size="10" font-weight="600" fill="#93C5FD" letter-spacing="1">LAYER 3 — DATA STORES</text>

  <!-- PostgreSQL -->
  <rect x="30" y="378" width="155" height="90" rx="8" fill="url(#box-pg)" filter="url(#shadow)"/>
  <rect x="30" y="378" width="155" height="90" rx="8" fill="none" stroke="#34D399" stroke-width="1.5"/>
  <text x="108" y="406" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">PostgreSQL 16</text>
  <text x="108" y="421" text-anchor="middle" font-size="9.5" font-weight="700" fill="#6EE7B7">+ pgvector</text>
  <line x1="50" y1="430" x2="165" y2="430" stroke="#34D399" stroke-width="0.7" opacity="0.4"/>
  <text x="108" y="445" text-anchor="middle" font-size="9" fill="#A7F3D0">Relational + Vector</text>
  <text x="108" y="460" text-anchor="middle" font-size="9" fill="#6EE7B7">RAG Embeddings</text>

  <!-- Redis -->
  <rect x="197" y="378" width="155" height="90" rx="8" fill="url(#box-redis)" filter="url(#shadow)"/>
  <rect x="197" y="378" width="155" height="90" rx="8" fill="none" stroke="#F87171" stroke-width="1.5"/>
  <text x="275" y="406" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">Redis 7</text>
  <line x1="215" y1="415" x2="337" y2="415" stroke="#F87171" stroke-width="0.7" opacity="0.4"/>
  <text x="275" y="430" text-anchor="middle" font-size="9" fill="#FECACA">Cache + Queue</text>
  <text x="275" y="447" text-anchor="middle" font-size="9" fill="#FCA5A5">Session / BullMQ</text>
  <text x="275" y="462" text-anchor="middle" font-size="9" fill="#FCA5A5">Semantic Cache</text>

  <!-- Elasticsearch -->
  <rect x="364" y="378" width="163" height="90" rx="8" fill="url(#box-es)" filter="url(#shadow)"/>
  <rect x="364" y="378" width="163" height="90" rx="8" fill="none" stroke="#FBBF24" stroke-width="1.5"/>
  <text x="446" y="406" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">Elasticsearch 8.15</text>
  <line x1="382" y1="415" x2="510" y2="415" stroke="#FBBF24" stroke-width="0.7" opacity="0.4"/>
  <text x="446" y="430" text-anchor="middle" font-size="9" fill="#FDE68A">Full-text Search</text>
  <text x="446" y="447" text-anchor="middle" font-size="9" fill="#FCD34D">Document Index</text>
  <text x="446" y="462" text-anchor="middle" font-size="9" fill="#FCD34D">Search API</text>

  <!-- Cassandra -->
  <rect x="539" y="378" width="155" height="90" rx="8" fill="url(#box-cassandra)" filter="url(#shadow)"/>
  <rect x="539" y="378" width="155" height="90" rx="8" fill="none" stroke="#C084FC" stroke-width="1.5"/>
  <text x="617" y="406" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">Cassandra 5.0</text>
  <line x1="557" y1="415" x2="676" y2="415" stroke="#C084FC" stroke-width="0.7" opacity="0.4"/>
  <text x="617" y="430" text-anchor="middle" font-size="9" fill="#E9D5FF">Time-series Logs</text>
  <text x="617" y="447" text-anchor="middle" font-size="9" fill="#DDD6FE">Audit Trails</text>
  <text x="617" y="462" text-anchor="middle" font-size="9" fill="#DDD6FE">Event Streaming</text>

  <!-- OpenAI -->
  <rect x="706" y="378" width="165" height="90" rx="8" fill="url(#box-openai)" filter="url(#shadow)"/>
  <rect x="706" y="378" width="165" height="90" rx="8" fill="none" stroke="#2DD4BF" stroke-width="1.5"/>
  <text x="789" y="400" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">OpenAI API</text>
  <line x1="724" y1="410" x2="855" y2="410" stroke="#2DD4BF" stroke-width="0.7" opacity="0.4"/>
  <text x="789" y="425" text-anchor="middle" font-size="9" fill="#99F6E4">GPT-4o-mini</text>
  <text x="789" y="440" text-anchor="middle" font-size="9" fill="#5EEAD4">+ Embeddings</text>
  <text x="789" y="455" text-anchor="middle" font-size="9" fill="#5EEAD4">text-embedding-3</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- ARROW: API → Infrastructure (Deploy) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <line x1="450" y1="285" x2="450" y2="490" stroke="#A78BFA" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-deploy)" opacity="0.7"/>
  <rect x="463" y="466" width="56" height="14" rx="3" fill="#0B1629" opacity="0.9"/>
  <text x="491" y="477" text-anchor="middle" font-size="8.5" fill="#C4B5FD" font-weight="600">Deploy</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LAYER 4 — INFRASTRUCTURE  (y=497, h=90) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="20" y="493" width="860" height="96" rx="10" fill="url(#grad-infra)" stroke="#6366F1" stroke-width="1" opacity="0.85"/>
  <text x="34" y="509" font-size="10" font-weight="600" fill="#A5B4FC" letter-spacing="1">LAYER 4 — INFRASTRUCTURE</text>

  <!-- AWS EC2 + Docker -->
  <rect x="50" y="516" width="240" height="62" rx="8" fill="url(#box-infra)" filter="url(#shadow)"/>
  <rect x="50" y="516" width="240" height="62" rx="8" fill="none" stroke="#818CF8" stroke-width="1.5"/>
  <text x="170" y="540" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">🐳 AWS EC2 + Docker</text>
  <text x="170" y="557" text-anchor="middle" font-size="9.5" fill="#C7D2FE">Containerized Deployment</text>
  <text x="170" y="571" text-anchor="middle" font-size="9" fill="#A5B4FC">Production Environment</text>

  <!-- GitHub Actions -->
  <rect x="330" y="516" width="240" height="62" rx="8" fill="url(#box-infra)" filter="url(#shadow)"/>
  <rect x="330" y="516" width="240" height="62" rx="8" fill="none" stroke="#818CF8" stroke-width="1.5"/>
  <text x="450" y="540" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">⚡ GitHub Actions CI/CD</text>
  <text x="450" y="557" text-anchor="middle" font-size="9.5" fill="#C7D2FE">Automated Pipelines</text>
  <text x="450" y="571" text-anchor="middle" font-size="9" fill="#A5B4FC">Test → Build → Deploy</text>

  <!-- S3 Backups -->
  <rect x="610" y="516" width="240" height="62" rx="8" fill="url(#box-infra)" filter="url(#shadow)"/>
  <rect x="610" y="516" width="240" height="62" rx="8" fill="none" stroke="#818CF8" stroke-width="1.5"/>
  <text x="730" y="540" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">☁ AWS S3 Backups</text>
  <text x="730" y="557" text-anchor="middle" font-size="9.5" fill="#C7D2FE">pg_dump Automated</text>
  <text x="730" y="571" text-anchor="middle" font-size="9" fill="#A5B4FC">Scheduled Backups</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LEGEND (bottom) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="20" y="600" width="860" height="46" rx="8" fill="#0D1E35" stroke="#1E40AF" stroke-width="1"/>
  <text x="50" y="618" font-size="9.5" font-weight="600" fill="#93C5FD" letter-spacing="0.5">LEGEND</text>

  <!-- Client -->
  <rect x="110" y="607" width="14" height="14" rx="3" fill="#2563EB"/>
  <text x="130" y="619" font-size="9.5" fill="#BFDBFE">Client Layer</text>

  <!-- API -->
  <rect x="225" y="607" width="14" height="14" rx="3" fill="#0369A1"/>
  <text x="245" y="619" font-size="9.5" fill="#BFDBFE">API Layer</text>

  <!-- Data -->
  <rect x="340" y="607" width="14" height="14" rx="3" fill="#065F46"/>
  <text x="360" y="619" font-size="9.5" fill="#BFDBFE">Data Stores</text>

  <!-- Infra -->
  <rect x="455" y="607" width="14" height="14" rx="3" fill="#374151"/>
  <text x="475" y="619" font-size="9.5" fill="#BFDBFE">Infrastructure</text>

  <!-- Connector lines legend -->
  <line x1="110" y1="635" x2="140" y2="635" stroke="#60A5FA" stroke-width="1.8" stroke-dasharray="5,3"/>
  <text x="148" y="639" font-size="9.5" fill="#BFDBFE">Client/Data Connection</text>

  <line x1="290" y1="635" x2="320" y2="635" stroke="#A78BFA" stroke-width="1.8" stroke-dasharray="6,3"/>
  <text x="328" y="639" font-size="9.5" fill="#BFDBFE">Deploy Pipeline</text>

  <line x1="440" y1="635" x2="470" y2="635" stroke="#60A5FA" stroke-width="1.8"/>
  <text x="478" y="639" font-size="9.5" fill="#BFDBFE">Direct API Connection</text>

  <!-- Version stamp -->
  <text x="860" y="643" text-anchor="end" font-size="8" fill="#4B6A8E">v1.0 · Day 66+</text>

</svg>
